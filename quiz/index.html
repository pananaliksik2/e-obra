<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagsusulit | E-Obra</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body class="bg-neu">
    <div class="bg-dotted-noise"></div>
    <div class="bg-soft-glow" id="soft-glow"></div>
    <div class="floating-elements">
        <div class="float-item corner-tr"></div>
        <div class="float-item corner-tl"></div>
        <div class="float-item corner-br"></div>
        <div class="float-item corner-bl"></div>
    </div>

    <div id="header-placeholder"></div>

    <main class="container mb-5">
        <div id="quiz-view" class="fade-in">
            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <button class="neu-btn-sm text-maroon border-0 bg-transparent" id="back-to-reader">
                    <i class="bi bi-arrow-left me-1"></i> Bumalik sa Pagbabasa
                </button>
                <div class="neu-badge" id="question-counter">-- / --</div>
            </div>

            <!-- Quiz Content Section -->
            <div id="quiz-content" class="neu-container neu-container-3d p-0 mb-4">
                <div class="side-ornament ornament-left"></div>
                <div class="side-ornament ornament-right"></div>
                <div class="p-4 p-md-5">
                <div class="text-center mb-5">
                    <h3 class="title-font text-maroon mb-2" id="quiz-chapter-title">Pagsusulit</h3>
                    <div class="neu-divider mx-auto"></div>
                </div>

                <div class="quiz-question-area mb-5">
                    <h4 class="quiz-question-neu mb-4" id="question-text">Loading question...</h4>
                    <div class="row g-3" id="options-container">
                        <!-- Options will be injected here -->
                    </div>
                </div>

                <div class="progress mt-4" style="height: 6px; background: rgba(128, 0, 0, 0.1);">
                    <div id="quiz-progress" class="progress-bar bg-maroon" role="progressbar" style="width: 0%"></div>
                </div>
                </div>
            </div>

            <!-- Result Section (Hidden initially) -->
            <div id="quiz-result" class="neu-container p-4 p-md-5 mb-4 text-center" style="display: none;">
                <div class="neu-icon-box mx-auto mb-4">
                    <i class="bi bi-trophy-fill display-4 text-maroon"></i>
                </div>
                <h2 class="title-font text-maroon mb-2">Tapos na ang Pagsusulit!</h2>
                <div id="score-text" class="mb-4">
                    <!-- Score will be injected here -->
                </div>
                <div class="d-flex flex-wrap justify-content-center gap-3">
                    <button class="neu-btn d-flex align-items-center gap-2" onclick="location.reload()">
                        <i class="bi bi-arrow-clockwise"></i> Ulitin ang Pagsusulit
                    </button>
                    <button class="neu-btn d-flex align-items-center gap-2" onclick="location.href='../dashboard/'">
                        <i class="bi bi-journal-bookmark"></i> Bumalik sa Aklatan
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="quiz.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('back-to-reader').onclick = () => {
                window.location.href = `../reader/`;
            };

            if (typeof startQuiz === 'function') {
                startQuiz(); // Will automatically use localStorage
            }
        });
    </script>
</body>
</html>
