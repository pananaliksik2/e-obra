<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagbabasa | E-Obra</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="reader.css">
</head>
<body class="bg-neu">
    <div class="bg-dotted-noise"></div>
    <div class="bg-soft-glow" id="soft-glow"></div>
    <div id="ink-transition"></div>
    
    <div class="floating-elements">
        <div class="float-item corner-tr"></div>
        <div class="float-item corner-tl"></div>
        <div class="float-item corner-br"></div>
        <div class="float-item corner-bl"></div>
    </div>

    <div id="header-placeholder"></div>

    <main class="container mt-4 mb-5">
        <div id="reader-view" class="fade-in">
            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <button class="neu-btn-sm text-maroon border-0 bg-transparent" id="back-to-chapters">
                    <i class="bi bi-arrow-left me-1"></i> Bumalik sa mga Kabanata
                </button>
            </div>

            <div class="neu-container neu-container-3d p-0 overflow-hidden mb-4 position-relative" id="chapter-reader">
                <div class="side-ornament ornament-left"></div>
                <div class="side-ornament ornament-right"></div>
                
                <div class="reading-progress-container">
                    <div id="reading-progress-bar" class="reading-progress-bar"></div>
                </div>
                <div class="p-4 p-md-5">
                <div class="text-center mb-5">
                    <h2 class="chapter-title-neu" id="chapter-title">
                        <span class="chapter-number-label d-block">Kabanata ...</span>
                        <span class="chapter-title-main">Loading...</span>
                    </h2>
                    <div class="neu-divider mx-auto"></div>
                </div>
                
                <div class="chapter-content-neu" id="chapter-content">
                    <!-- Content goes here -->
                    <div class="text-center p-5">
                        <div class="spinner-border text-maroon" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-center align-items-center gap-4 mt-5">
                    <button class="neu-btn-icon" id="prev-btn" title="Nakaraang Pahina">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <span class="neu-page-indicator" id="page-indicator">Pahina 1</span>
                    <button class="neu-btn-icon" id="next-btn" title="Susunod na Pahina">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
                </div>
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3">
                <button class="neu-btn d-flex align-items-center gap-2" id="download-pdf">
                    <i class="bi bi-file-earmark-pdf"></i> I-download bilang PDF
                </button>
                <button class="neu-btn d-flex align-items-center gap-2" id="start-quiz">
                    <i class="bi bi-pencil-square"></i> Pagsusulit
                </button>
                <button class="neu-btn d-flex align-items-center gap-2 d-none" id="next-chapter-btn">
                    Susunod <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </div>
    </main>
    
    <!-- Glossary Tooltip -->
    <div id="glossary-tooltip" class="neu-tooltip">
        <div class="tooltip-content">
            <h5 id="tooltip-word" class="text-maroon mb-2"></h5>
            <div class="neu-divider-sm mb-2"></div>
            <p id="tooltip-definition" class="mb-0 small"></p>
        </div>
        <div class="tooltip-arrow"></div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="reader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set back button link
            document.getElementById('back-to-chapters').onclick = () => {
                window.location.href = `../chapters/`;
            };

            // Set quiz button link
            document.getElementById('start-quiz').onclick = () => {
                window.location.href = `../quiz/`;
            };

            if (typeof startReading === 'function') {
                startReading(); // Will automatically use localStorage
            }
        });
    </script>
</body>
</html>
