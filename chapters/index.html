<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mga Kabanata | E-Obra</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="chapters.css">
</head>
<body class="bg-neu">
    <div class="bg-dotted-noise"></div>

    <div id="header-placeholder"></div>

    <main class="container mb-5">
        <div id="chapter-list-view" class="neu-container p-0 overflow-hidden fade-in">
            <!-- Sticky Top Section -->
            <div class="sticky-header-section p-4 p-md-5 pb-4">
                <div class="mb-4">
                    <button class="neu-btn-sm text-maroon border-0 bg-transparent p-0" onclick="location.href='../dashboard/'">
                        <i class="bi bi-arrow-left me-1"></i> Bumalik sa Aklatan
                    </button>
                </div>

                <div class="text-center mb-4">
                    <h2 class="title-font text-maroon mb-1" id="book-title-header">Noli Me Tangere</h2>
                    <p class="author-name mb-3">ni José Rizal</p>
                    <p class="text-muted small">Pumili ng kabanata upang simulan ang pagbabasa</p>
                </div>

                <!-- Search Section -->
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="neu-search-wrapper">
                            <i class="bi bi-search text-maroon"></i>
                            <input type="text" id="chapter-search" class="neu-input-search" placeholder="Maghanap ng Kabanata o Pamagat...">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Scrollable List Section -->
            <div class="scrollable-chapters-list p-4 p-md-5 pt-2">
                <div class="row justify-content-center">
                    <div class="col-md-10 col-lg-8">
                        <div class="row g-3" id="chapter-list-container">
                            <!-- Chapter items will be injected here via JS -->
                            <div class="text-center p-5">
                                <div class="spinner-border text-maroon" role="status">
                                    <span class="visually-hidden">Ikinakarga...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="chapters.js"></script>
</body>
</html>
